services:
  # ─── Angular Frontend ──────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: zahed_frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    # Ensure command binds to 0.0.0.0 and disables host check to prevent 502/Invalid Host Header
    command: npx ng serve --host 0.0.0.0 --disable-host-check
    stdin_open: true
    tty: true
    networks:
      - zahed_net

  # ─── Django API Backend ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zahed_backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-default-key-replace-me}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-thezhasan.com,api.thezhasan.com,localhost}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-zahed_portfolio}
      - DB_USER=${DB_USER:-zahed}
      - DB_PASSWORD=${DB_PASSWORD:-zahed_pass}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - zahed_net

  # ─── MySQL Database ────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: zahed_mysql
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${DB_NAME:-zahed_portfolio}
      - MYSQL_USER=${DB_USER:-zahed}
      - MYSQL_PASSWORD=${DB_PASSWORD:-zahed_pass}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_pass}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - zahed_net

volumes:
  mysql_data:

networks:
  zahed_net:
    driver: bridge
