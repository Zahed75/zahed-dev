version: '3.9'

services:
  # ─── Django API Backend ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zahed_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=thezhasan.com,api.thezhasan.com,localhost
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-zahed_portfolio}
      - DB_USER=${DB_USER:-zahed}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - media_files:/app/media
      - static_files:/app/static
    depends_on:
      db:
        condition: service_healthy
    networks:
      - zahed_net

  # ─── MySQL Database ────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: zahed_mysql
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${DB_NAME:-zahed_portfolio}
      - MYSQL_USER=${DB_USER:-zahed}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - zahed_net

  # ─── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: zahed_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - media_files:/var/www/media:ro
      - static_files:/var/www/static:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - zahed_net

  # ─── Certbot (SSL) ────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: zahed_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    command: certonly --webroot --webroot-path /var/www/certbot --email zahed.hasan.rabbi@gmail.com --agree-tos --no-eff-email -d thezhasan.com -d api.thezhasan.com

volumes:
  mysql_data:
  media_files:
  static_files:
  certbot_certs:
  certbot_www:

networks:
  zahed_net:
    driver: bridge
