version: '3.8'

services:
  # ─── Angular Frontend ──────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: zahed_frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true

  # ─── Django API Backend ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zahed_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=thezhasan.com,api.thezhasan.com,localhost
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-zahed_portfolio}
      - DB_USER=${DB_USER:-zahed}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./backend:/app
      - /app/venv
    depends_on:
      db:
        condition: service_healthy

  # ─── MySQL Database ────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: zahed_mysql
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${DB_NAME:-zahed_portfolio}
      - MYSQL_USER=${DB_USER:-zahed}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:
