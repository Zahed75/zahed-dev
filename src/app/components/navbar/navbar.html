<header 
  class="fixed w-full top-0 z-50 transition-all duration-300 backdrop-blur-md"
  [class.bg-white/90]="isScrolled || isMenuOpen"
  [class.bg-transparent]="!isScrolled && !isMenuOpen"
  [class.border-b]="isScrolled || isMenuOpen"
  [class.border-neutral-200/50]="isScrolled || isMenuOpen"
  [class.border-transparent]="!isScrolled && !isMenuOpen"
  [class.shadow-sm]="isScrolled">
  
  <div class="container-xl">
    <div class="flex items-center justify-between h-20 lg:h-24">
      
      <!-- Logo -->
      <a routerLink="/" class="flex flex-col relative z-50 group" (click)="closeMenu()">
        <span class="text-xl lg:text-2xl font-black tracking-tighter uppercase leading-none group-hover:opacity-60 transition-opacity">Zahed Hasan</span>
        <span class="text-[0.65rem] font-bold tracking-[0.2em] text-neutral-400 uppercase mt-1">Engineering Manager</span>
      </a>

      <!-- Desktop Navigation -->
      <nav class="hidden lg:flex items-center gap-8">
        <a routerLink="/about-me" routerLinkActive="nav-link-active" class="text-sm font-medium text-neutral-500 hover:text-black transition-colors">Strategy</a>
        <a routerLink="/projects" routerLinkActive="nav-link-active" class="text-sm font-medium text-neutral-500 hover:text-black transition-colors">Portfolio</a>
        <a routerLink="/blog" routerLinkActive="nav-link-active" class="text-sm font-medium text-neutral-500 hover:text-black transition-colors">Blogs</a>
        <a routerLink="/contact" routerLinkActive="nav-link-active" class="text-sm font-medium text-neutral-500 hover:text-black transition-colors">Contact</a>
        
        <div class="w-px h-4 bg-neutral-200 mx-2"></div>
        
        <a *ngIf="resumeUrl" [href]="resumeUrl" target="_blank" class="text-sm font-bold text-neutral-400 hover:text-black transition-colors flex items-center gap-1.5">
          Resume <mat-icon class="!text-[14px] !w-[14px] !h-[14px]">download</mat-icon>
        </a>
        <a routerLink="/contact" class="btn-primary !px-5 !py-2.5 !font-bold !text-xs !tracking-wider !uppercase">
          Schedule Call
        </a>
      </nav>

      <!-- Mobile Menu Button -->
      <button 
        class="lg:hidden p-2 -mr-2 text-black hover:opacity-60 transition-opacity relative z-50 focus:outline-none"
        (click)="toggleMenu()"
        aria-label="Toggle menu">
        <div class="w-6 h-5 relative flex flex-col justify-between transform transition-all duration-300">
          <span class="w-full h-0.5 bg-current transform transition-all duration-300" [class.rotate-45]="isMenuOpen" [class.translate-y-2]="isMenuOpen"></span>
          <span class="w-full h-0.5 bg-current transition-all duration-300" [class.opacity-0]="isMenuOpen"></span>
          <span class="w-full h-0.5 bg-current transform transition-all duration-300" [class.-rotate-45]="isMenuOpen" [class.-translate-y-2.5]="isMenuOpen"></span>
        </div>
      </button>

    </div>
  </div>

  <!-- Mobile Menu Overlay -->
  <div 
    class="fixed inset-0 bg-white/95 backdrop-blur-xl z-40 transition-all duration-500 ease-[cubic-bezier(0.22,1,0.36,1)] lg:hidden flex flex-col pt-24 pb-10 px-6 overflow-y-auto"
    [class.opacity-100]="isMenuOpen"
    [class.pointer-events-auto]="isMenuOpen"
    [class.opacity-0]="!isMenuOpen"
    [class.pointer-events-none]="!isMenuOpen">
    
    <nav class="flex flex-col gap-6 sm:gap-8 text-xl sm:text-3xl font-black uppercase tracking-tighter mt-4 transition-all duration-700 delay-100" [class.translate-y-0]="isMenuOpen" [class.translate-y-10]="!isMenuOpen" [class.opacity-100]="isMenuOpen" [class.opacity-0]="!isMenuOpen">
      <a routerLink="/" (click)="closeMenu()" class="hover:text-neutral-500 transition-colors py-2 border-b border-gray-100 inline-block">Home</a>
      <a routerLink="/about-me" (click)="closeMenu()" class="hover:text-neutral-500 transition-colors py-2 border-b border-gray-100 inline-block">Strategy</a>
      <a routerLink="/projects" (click)="closeMenu()" class="hover:text-neutral-500 transition-colors py-2 border-b border-gray-100 inline-block">Portfolio</a>
      <a routerLink="/blog" (click)="closeMenu()" class="hover:text-neutral-500 transition-colors py-2 border-b border-gray-100 inline-block">Blogs</a>
      <a routerLink="/contact" (click)="closeMenu()" class="hover:text-neutral-500 transition-colors py-2 border-b border-gray-100 inline-block">Contact</a>
    </nav>

    <div class="mt-auto transition-all duration-700 delay-200" [class.translate-y-0]="isMenuOpen" [class.translate-y-10]="!isMenuOpen" [class.opacity-100]="isMenuOpen" [class.opacity-0]="!isMenuOpen">
      <div class="divider mb-6"></div>
      <a *ngIf="resumeUrl" [href]="resumeUrl" target="_blank" (click)="closeMenu()" class="text-sm font-bold text-neutral-400 hover:text-black transition-colors flex items-center gap-2 mb-6">
        Download Resume <mat-icon class="!text-[14px] !w-[14px] !h-[14px]">download</mat-icon>
      </a>
      <a routerLink="/contact" (click)="closeMenu()" class="btn-primary w-full shadow-lg">
        Schedule Advisory Call
      </a>
    </div>
  </div>
</header>
